<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practical Assignment</title>
    <style>
        .abc{
            text-align: center;
            font-size: xx-large;
            color: #333;
            margin-top: 20px;
            background-origin: padding-box;
        }

        h2{
            text-align: center;
            font-size: medium;
            color: gray;
            background-origin: padding-box;
        }
        .flex-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            margin: 10px;
            gap: 10px;
            
        }
        .flex-item {
            background-color:white;
            color: rgb(2, 0, 0);
            padding: 20px;
            font-size: 20px;
            border: 2px solid #333;
           
            
        }

        .grid-container {
            display: grid;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        .grid-item {
            background-color:#fbbb3a;
            color: rgb(2, 0, 0);
            padding: 20px;
            font-size: 20px;

            text-align: center;

        }

        h4{
            text-align: center;
            font-size: large;
            color: #252525;
            background-origin: padding-box;
        }

        h5{
            background-color: skyblue;
            color: rgb(88, 88, 88);
            position: relative;
            font-size: medium;
            height: 30px;
            padding: 20px;
            border: 2px solid #707070;
            margin: 0 0 0 50px;
        }

        .box {
            position: relative; /* Essential to contain the absolute child */
            width: 100%;
            height: 100px;
            border: 1px solid #ccc;
            background-color: #fff;
            padding: 10px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            margin: 20px 0;
        }

        .parent-box {
            position: relative;
            height: 10px;
           background-color: #fff;
            padding: 10px;
            font-family: Arial, sans-serif;
            width: 150px;
        }

        .absolute-box {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: red;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1 class="abc">CSS Practical Assignment</h1>
    <h2>Learn Flexbox, Grid and Positioning</h2><br>       <h3 class="abc">Flex Box Example</h3>
    <div class="flex-container">
        <div class="flex-item">HTML</div>
        <div class="flex-item">CSS</div>
        <div class="flex-item">JavaScript</div>
    </div>  
    <h3 class="abc">Grid Layout Example</h3>
    <div class="grid-container" style="display: grid; grid-template-columns: repeat(3, 1fr);">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>

    </div>
    <h4 class="abc">CSS Position values</h4>
    <h5>position: relative</h5>
    <div class="box">
  <div class="parent-box">Parent Box</div>
  <div class="absolute-box">Position: Absolute</div>
    </div>
    <div style="position:sticky; background-color: purple; color: white; height: 20px; padding: 10px; font-size: 14px; border: 2px solid #333; margin: 10px;">
        Position: Sticky</div>
     <div style="position:static; background-color: white; color: black; height: 40px; padding: 10px; font-size: 20px; border: 2px solid #333; margin: 10px;">
        Position: Static(Default)
     </div>
     <div style="text-align: center; font-size: 20px; background-color: black; color: white; height: 40px; padding: 10px; border: 2px solid #333; margin: 10px;">
        Simple CSS Assignment
     </div>
     <h6 style="position: fixed; bottom: 10px; right: 10px; background-color: rgb(3, 90, 3); color: white; height: 20px; padding: 10px; border: 2px solid #333; margin: 10px; font-size: 14px;">
        Position: Fixed
     </h6>
</body>
</html>
